<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient6)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Main Container -->
  <rect x="50" y="80" width="700" height="440" rx="20" fill="#0f172a" opacity="0.9"/>

  <!-- Header -->
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">Product Catalog</text>

  <!-- Product Grid -->
  <g>
    <!-- Product 1 -->
    <rect x="80" y="160" width="140" height="160" rx="12" fill="#8b5cf6" opacity="0.2"/>
    <rect x="80" y="160" width="140" height="160" rx="12" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="95" y="175" width="110" height="90" rx="8" fill="#4c1d95"/>
    <text x="150" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Product 1</text>
    <text x="150" y="310" font-family="Arial, sans-serif" font-size="12" fill="#a78bfa" text-anchor="middle">RM 99.00</text>

    <!-- Product 2 -->
    <rect x="240" y="160" width="140" height="160" rx="12" fill="#ec4899" opacity="0.2"/>
    <rect x="240" y="160" width="140" height="160" rx="12" fill="none" stroke="#ec4899" stroke-width="2"/>
    <rect x="255" y="175" width="110" height="90" rx="8" fill="#831843"/>
    <text x="310" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Product 2</text>
    <text x="310" y="310" font-family="Arial, sans-serif" font-size="12" fill="#f9a8d4" text-anchor="middle">RM 149.00</text>

    <!-- Product 3 -->
    <rect x="400" y="160" width="140" height="160" rx="12" fill="#06b6d4" opacity="0.2"/>
    <rect x="400" y="160" width="140" height="160" rx="12" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <rect x="415" y="175" width="110" height="90" rx="8" fill="#164e63"/>
    <text x="470" y="290" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Product 3</text>
    <text x="470" y="310" font-family="Arial, sans-serif" font-size="12" fill="#67e8f9" text-anchor="middle">RM 79.00</text>

    <!-- Product 4 -->
    <rect x="560" y="160" width="140" height="160" rx="12" fill="#10b981" opacity="0.2"/>
    <rect x="560" y="160" width="140" height="160" rx="12" fill="none" stroke="#10b981" stroke-width="2"/>
    <rect x="575" y="175" width="110" height="90" rx="8" fill="#065f46"/>
