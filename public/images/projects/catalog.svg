    <rect x="335" y="355" width="110" height="90" rx="8" fill="#7f1d1d"/>
    <text x="390" y="470" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Product 6</text>
    <text x="390" y="490" font-family="Arial, sans-serif" font-size="12" fill="#fca5a5" text-anchor="middle">RM 89.00</text>

    <!-- Product 7 -->
    <rect x="480" y="340" width="140" height="160" rx="12" fill="#8b5cf6" opacity="0.2"/>
    <rect x="480" y="340" width="140" height="160" rx="12" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="495" y="355" width="110" height="90" rx="8" fill="#4c1d95"/>
    <text x="550" y="470" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Product 7</text>
    <text x="550" y="490" font-family="Arial, sans-serif" font-size="12" fill="#c4b5fd" text-anchor="middle">RM 159.00</text>
