    <text x="630" y="310" font-family="Arial, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">RM 129.00</text>
  </g>

  <!-- Bottom Products -->
  <g>
    <!-- Product 5 -->
    <rect x="160" y="340" width="140" height="160" rx="12" fill="#f59e0b" opacity="0.2"/>
    <rect x="160" y="340" width="140" height="160" rx="12" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <rect x="175" y="355" width="110" height="90" rx="8" fill="#78350f"/>
    <text x="230" y="470" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Product 5</text>
    <text x="230" y="490" font-family="Arial, sans-serif" font-size="12" fill="#fcd34d" text-anchor="middle">RM 199.00</text>

    <!-- Product 6 -->
    <rect x="320" y="340" width="140" height="160" rx="12" fill="#ef4444" opacity="0.2"/>
