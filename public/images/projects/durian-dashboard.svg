<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient4)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Main Dashboard -->
  <rect x="50" y="80" width="700" height="440" rx="20" fill="#0f172a" opacity="0.9"/>

  <!-- Sidebar -->
  <rect x="50" y="80" width="180" height="440" rx="20" fill="#1e293b"/>

  <!-- Header -->
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">Durian Dashboard</text>

  <!-- Stats Cards -->
  <g>
    <!-- Card 1 -->
    <rect x="260" y="170" width="150" height="100" rx="12" fill="#f59e0b" opacity="0.2"/>
    <rect x="260" y="170" width="150" height="100" rx="12" fill="none" stroke="#f59e0b" stroke-width="2"/>
    <text x="335" y="210" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#f59e0b" text-anchor="middle">Total Sales</text>
    <text x="335" y="245" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">RM 12K</text>

    <!-- Card 2 -->
    <rect x="430" y="170" width="150" height="100" rx="12" fill="#10b981" opacity="0.2"/>
    <rect x="430" y="170" width="150" height="100" rx="12" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="505" y="210" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#10b981" text-anchor="middle">Orders</text>
    <text x="505" y="245" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">245</text>

    <!-- Card 3 -->
    <rect x="600" y="170" width="130" height="100" rx="12" fill="#0ea5e9" opacity="0.2"/>
    <rect x="600" y="170" width="130" height="100" rx="12" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <text x="665" y="210" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#0ea5e9" text-anchor="middle">Products</text>
    <text x="665" y="245" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">48</text>
  </g>

  <!-- Table/List -->
  <rect x="260" y="290" width="470" height="210" rx="12" fill="#1e293b"/>
  <text x="280" y="320" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#94a3b8">Recent Orders</text>

  <!-- Table Rows -->
  <g opacity="0.6">
    <rect x="280" y="340" width="430" height="30" rx="6" fill="#334155"/>
    <rect x="280" y="380" width="430" height="30" rx="6" fill="#334155"/>
    <rect x="280" y="420" width="430" height="30" rx="6" fill="#334155"/>
    <rect x="280" y="460" width="430" height="30" rx="6" fill="#334155"/>
  </g>

  <!-- Sidebar Icons -->
  <g>
    <circle cx="140" cy="150" r="8" fill="#f59e0b"/>
    <circle cx="140" cy="190" r="8" fill="#10b981"/>
    <circle cx="140" cy="230" r="8" fill="#0ea5e9"/>
    <circle cx="140" cy="270" r="8" fill="#94a3b8"/>
  </g>
</svg>