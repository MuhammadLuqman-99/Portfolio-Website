<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient7)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Main Container -->
  <rect x="50" y="80" width="700" height="440" rx="20" fill="#0f172a" opacity="0.95"/>

  <!-- Header -->
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#eab308" text-anchor="middle">KILAT LMS</text>

  <!-- Brain/AI Icon -->
  <circle cx="400" cy="190" r="25" fill="none" stroke="#eab308" stroke-width="3"/>
  <circle cx="390" cy="185" r="4" fill="#eab308"/>
  <circle cx="410" cy="185" r="4" fill="#eab308"/>
  <path d="M 385 200 Q 400 210 415 200" stroke="#eab308" stroke-width="3" fill="none"/>

  <!-- Tagline -->
  <text x="400" y="250" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">Master AI & Prompt Engineering</text>

  <!-- Course Cards -->
  <g>
    <!-- Course 1 -->
    <rect x="80" y="280" width="200" height="100" rx="12" fill="#eab308" opacity="0.2"/>
    <rect x="80" y="280" width="200" height="100" rx="12" fill="none" stroke="#eab308" stroke-width="2"/>
    <text x="180" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">ChatGPT Mastery</text>
    <text x="180" y="335" font-family="Arial, sans-serif" font-size="12" fill="#fde047" text-anchor="middle">12 Lessons</text>
    <rect x="100" y="350" width="160" height="8" rx="4" fill="#1e293b"/>
    <rect x="100" y="350" width="120" height="8" rx="4" fill="#eab308"/>

    <!-- Course 2 -->
    <rect x="300" y="280" width="200" height="100" rx="12" fill="#f97316" opacity="0.2"/>
    <rect x="300" y="280" width="200" height="100" rx="12" fill="none" stroke="#f97316" stroke-width="2"/>
    <text x="400" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Prompt Engineering</text>
    <text x="400" y="335" font-family="Arial, sans-serif" font-size="12" fill="#fdba74" text-anchor="middle">8 Lessons</text>
    <rect x="320" y="350" width="160" height="8" rx="4" fill="#1e293b"/>
    <rect x="320" y="350" width="80" height="8" rx="4" fill="#f97316"/>

    <!-- Course 3 -->
    <rect x="520" y="280" width="200" height="100" rx="12" fill="#10b981" opacity="0.2"/>
    <rect x="520" y="280" width="200" height="100" rx="12" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="620" y="310" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Claude AI Basics</text>
    <text x="620" y="335" font-family="Arial, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">10 Lessons</text>
    <rect x="540" y="350" width="160" height="8" rx="4" fill="#1e293b"/>
    <rect x="540" y="350" width="50" height="8" rx="4" fill="#10b981"/>
  </g>

  <!-- Stats -->
  <g>
    <rect x="80" y="410" width="200" height="80" rx="12" fill="#1e293b"/>
    <text x="180" y="440" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#eab308" text-anchor="middle">500+</text>
    <text x="180" y="470" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Students Enrolled</text>

    <rect x="300" y="410" width="200" height="80" rx="12" fill="#1e293b"/>
    <text x="400" y="440" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f97316" text-anchor="middle">30+</text>
    <text x="400" y="470" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">AI Courses</text>

    <rect x="520" y="410" width="200" height="80" rx="12" fill="#1e293b"/>
    <text x="620" y="440" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#10b981" text-anchor="middle">4.8★</text>
    <text x="620" y="470" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Average Rating</text>
  </g>

  <!-- Decorative Elements -->
  <circle cx="120" cy="250" r="8" fill="#eab308" opacity="0.3"/>
  <circle cx="680" cy="250" r="10" fill="#f97316" opacity="0.3"/>
  <rect x="150" y="245" width="30" height="3" rx="2" fill="#10b981" opacity="0.3"/>
</svg>