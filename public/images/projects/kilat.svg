<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient7)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Main Container -->
  <rect x="50" y="80" width="700" height="440" rx="20" fill="#0f172a" opacity="0.95"/>

  <!-- Header -->
  <text x="400" y="140" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="#eab308" text-anchor="middle">KILAT</text>

  <!-- Lightning Icon -->
  <path d="M 380 180 L 400 160 L 390 200 L 410 200 L 390 240 L 400 210 L 380 210 Z" fill="#eab308" opacity="0.8"/>

  <!-- Tagline -->
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="20" fill="#94a3b8" text-anchor="middle">Lightning Fast Delivery Service</text>

  <!-- Features -->
  <g>
    <!-- Feature 1 -->
    <rect x="100" y="310" width="180" height="80" rx="12" fill="#eab308" opacity="0.2"/>
    <rect x="100" y="310" width="180" height="80" rx="12" fill="none" stroke="#eab308" stroke-width="2"/>
    <text x="190" y="340" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Quick Pickup</text>
    <text x="190" y="370" font-family="Arial, sans-serif" font-size="12" fill="#fde047" text-anchor="middle">15 min response</text>

    <!-- Feature 2 -->
    <rect x="310" y="310" width="180" height="80" rx="12" fill="#f97316" opacity="0.2"/>
    <rect x="310" y="310" width="180" height="80" rx="12" fill="none" stroke="#f97316" stroke-width="2"/>
    <text x="400" y="340" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Track Live</text>
    <text x="400" y="370" font-family="Arial, sans-serif" font-size="12" fill="#fdba74" text-anchor="middle">Real-time GPS</text>

    <!-- Feature 3 -->
    <rect x="520" y="310" width="180" height="80" rx="12" fill="#10b981" opacity="0.2"/>
    <rect x="520" y="310" width="180" height="80" rx="12" fill="none" stroke="#10b981" stroke-width="2"/>
    <text x="610" y="340" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Same Day</text>
    <text x="610" y="370" font-family="Arial, sans-serif" font-size="12" fill="#6ee7b7" text-anchor="middle">Express delivery</text>
  </g>

  <!-- Stats -->
  <g>
    <text x="200" y="440" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#eab308" text-anchor="middle">1000+</text>
    <text x="200" y="470" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Deliveries</text>

    <text x="400" y="440" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#f97316" text-anchor="middle">4.9★</text>
    <text x="400" y="470" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Rating</text>

    <text x="600" y="440" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#10b981" text-anchor="middle">24/7</text>
    <text x="600" y="470" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8" text-anchor="middle">Available</text>
  </g>

  <!-- Decorative Lightning Bolts -->
  <path d="M 120 500 L 125 495 L 122 505 L 127 505 L 122 515 L 125 507 L 120 507 Z" fill="#eab308" opacity="0.3"/>
  <path d="M 680 500 L 685 495 L 682 505 L 687 505 L 682 515 L 685 507 L 680 507 Z" fill="#f97316" opacity="0.3"/>
</svg>