<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient3)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Browser Window -->
  <rect x="100" y="100" width="600" height="400" rx="12" fill="#0f172a" opacity="0.9"/>

  <!-- Browser Header -->
  <rect x="100" y="100" width="600" height="40" rx="12" fill="#1e293b"/>
  <rect x="100" y="126" width="600" height="374" rx="0 0 12 12" fill="#0f172a" opacity="0.9"/>

  <!-- Browser Dots -->
  <circle cx="120" cy="120" r="6" fill="#ef4444"/>
  <circle cx="140" cy="120" r="6" fill="#f59e0b"/>
  <circle cx="160" cy="120" r="6" fill="#10b981"/>

  <!-- Title -->
  <text x="400" y="180" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">Landing Page Generator</text>

  <!-- Template Cards -->
  <g>
    <!-- Card 1 - SaaS -->
    <rect x="130" y="220" width="150" height="100" rx="8" fill="#7c3aed" opacity="0.3"/>
    <rect x="130" y="220" width="150" height="100" rx="8" fill="none" stroke="#7c3aed" stroke-width="2"/>
    <text x="205" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">SaaS</text>
    <text x="205" y="275" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Modern</text>

    <!-- Card 2 - E-commerce -->
    <rect x="325" y="220" width="150" height="100" rx="8" fill="#ec4899" opacity="0.3"/>
    <rect x="325" y="220" width="150" height="100" rx="8" fill="none" stroke="#ec4899" stroke-width="2"/>
    <text x="400" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">E-commerce</text>
    <text x="400" y="275" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Shop</text>

    <!-- Card 3 - Agency -->
    <rect x="520" y="220" width="150" height="100" rx="8" fill="#0ea5e9" opacity="0.3"/>
    <rect x="520" y="220" width="150" height="100" rx="8" fill="none" stroke="#0ea5e9" stroke-width="2"/>
    <text x="595" y="250" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Agency</text>
    <text x="595" y="275" font-family="Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Creative</text>
  </g>

  <!-- Color Picker UI -->
  <g>
    <rect x="130" y="350" width="540" height="60" rx="8" fill="#1e293b"/>
    <text x="150" y="375" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Primary Color:</text>

    <!-- Color Swatches -->
    <circle cx="280" cy="380" r="15" fill="#7c3aed"/>
    <circle cx="320" cy="380" r="15" fill="#ec4899"/>
    <circle cx="360" cy="380" r="15" fill="#0ea5e9"/>
    <circle cx="400" cy="380" r="15" fill="#10b981"/>
    <circle cx="440" cy="380" r="15" fill="#f59e0b"/>

    <!-- Export Button -->
    <rect x="520" y="360" width="130" height="40" rx="6" fill="#7c3aed"/>
    <text x="585" y="385" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Export HTML</text>
  </g>

  <!-- Decorative Elements -->
  <g opacity="0.3">
    <circle cx="150" cy="480" r="20" fill="#7c3aed"/>
    <circle cx="650" cy="480" r="25" fill="#ec4899"/>
    <rect x="350" y="460" width="100" height="4" rx="2" fill="#0ea5e9"/>
  </g>
</svg>