<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient2)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Main Card -->
  <rect x="50" y="80" width="700" height="440" rx="20" fill="#0f172a" opacity="0.9"/>

  <!-- Header -->
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">SEO Audit Tool</text>

  <!-- Score Circle -->
  <circle cx="400" cy="280" r="100" fill="none" stroke="#1e293b" stroke-width="20"/>
  <circle cx="400" cy="280" r="100" fill="none" stroke="#10b981" stroke-width="20"
          stroke-dasharray="565" stroke-dashoffset="113" transform="rotate(-90 400 280)"/>

  <!-- Score Text -->
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="#10b981" text-anchor="middle">85</text>
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">SEO Score</text>

  <!-- Metrics -->
  <g>
    <!-- Meta Tags -->
    <rect x="100" y="400" width="150" height="8" rx="4" fill="#1e293b"/>
    <rect x="100" y="400" width="135" height="8" rx="4" fill="#10b981"/>
    <text x="100" y="430" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Meta Tags: 90%</text>

    <!-- Performance -->
    <rect x="280" y="400" width="150" height="8" rx="4" fill="#1e293b"/>
    <rect x="280" y="400" width="120" height="8" rx="4" fill="#f59e0b"/>
    <text x="280" y="430" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Performance: 80%</text>

    <!-- Mobile -->
    <rect x="460" y="400" width="150" height="8" rx="4" fill="#1e293b"/>
    <rect x="460" y="400" width="150" height="8" rx="4" fill="#10b981"/>
    <text x="460" y="430" font-family="Arial, sans-serif" font-size="14" fill="#94a3b8">Mobile: 100%</text>
  </g>

  <!-- Icons -->
  <g>
    <!-- Checkmark Icon -->
    <circle cx="150" cy="200" r="20" fill="#10b981" opacity="0.2"/>
    <path d="M 145 200 L 150 205 L 160 195" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Speed Icon -->
    <circle cx="400" cy="200" r="20" fill="#f59e0b" opacity="0.2"/>
    <path d="M 390 200 L 410 200 M 400 190 L 400 200" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>

    <!-- Mobile Icon -->
    <circle cx="650" cy="200" r="20" fill="#0ea5e9" opacity="0.2"/>
    <rect x="644" y="192" width="12" height="16" rx="2" fill="none" stroke="#0ea5e9" stroke-width="2"/>
  </g>
</svg>