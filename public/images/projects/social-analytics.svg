<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Gradient -->
  <defs>
    <linearGradient id="bgGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGradient1)"/>

  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="150" x2="800" y2="150" stroke="white" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke="white" stroke-width="1"/>
    <line x1="0" y1="450" x2="800" y2="450" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="600" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="600" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="600" stroke="white" stroke-width="1"/>
  </g>

  <!-- Main Dashboard Card -->
  <rect x="50" y="80" width="700" height="440" rx="20" fill="url(#cardGradient)"/>

  <!-- Header -->
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">Social Media Analytics</text>

  <!-- Stats Cards -->
  <g>
    <!-- Instagram Card -->
    <rect x="80" y="170" width="200" height="120" rx="12" fill="#e4405f" opacity="0.2"/>
    <rect x="80" y="170" width="200" height="120" rx="12" fill="none" stroke="#e4405f" stroke-width="2"/>
    <text x="180" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#e4405f" text-anchor="middle">Instagram</text>
    <text x="180" y="250" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">24.5K</text>

    <!-- Facebook Card -->
    <rect x="300" y="170" width="200" height="120" rx="12" fill="#1877f2" opacity="0.2"/>
    <rect x="300" y="170" width="200" height="120" rx="12" fill="none" stroke="#1877f2" stroke-width="2"/>
    <text x="400" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#1877f2" text-anchor="middle">Facebook</text>
    <text x="400" y="250" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">18.2K</text>

    <!-- TikTok Card -->
    <rect x="520" y="170" width="200" height="120" rx="12" fill="#00f2ea" opacity="0.2"/>
    <rect x="520" y="170" width="200" height="120" rx="12" fill="none" stroke="#00f2ea" stroke-width="2"/>
    <text x="620" y="210" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#00f2ea" text-anchor="middle">TikTok</text>
    <text x="620" y="250" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff" text-anchor="middle">32.1K</text>
  </g>

  <!-- Chart Area -->
  <rect x="80" y="320" width="640" height="180" rx="12" fill="#1e293b" opacity="0.6"/>

  <!-- Simplified Line Chart -->
  <polyline points="100,450 180,420 260,440 340,400 420,410 500,380 580,390 660,360"
            fill="none" stroke="#0ea5e9" stroke-width="3" opacity="0.8"/>
  <polyline points="100,470 180,450 260,460 340,430 420,440 500,420 580,425 660,410"
            fill="none" stroke="#e4405f" stroke-width="3" opacity="0.8"/>

  <!-- Chart dots -->
  <circle cx="100" cy="450" r="4" fill="#0ea5e9"/>
  <circle cx="260" cy="440" r="4" fill="#0ea5e9"/>
  <circle cx="420" cy="410" r="4" fill="#0ea5e9"/>
  <circle cx="580" cy="390" r="4" fill="#0ea5e9"/>
  <circle cx="660" cy="360" r="4" fill="#0ea5e9"/>
</svg>